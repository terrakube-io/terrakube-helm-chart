name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    # depending on default permission settings for your org (contents being read-only or read-write for workloads), you will have to add permissions
    # see: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#modifying-the-permissions-for-the-github_token
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Add repositories
        run: |
          for dir in $(ls -d charts/*/); do
            helm dependency list $dir 2> /dev/null | tail +2 | head -n -1 | awk '{ print "helm repo add " $1 " " $3 }' | while read cmd; do $cmd; done
          done

      - name: Log in to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "$DOCKERHUB_TOKEN" | helm registry login registry-1.docker.io --username "$DOCKERHUB_USERNAME" --password-stdin

      - name: Package and push charts to OCI registry
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
        run: |
          mkdir -p .oci-release-packages
          namespace="${DOCKERHUB_NAMESPACE:-$DOCKERHUB_USERNAME}"
          namespace="${namespace,,}"

          if [ -z "$namespace" ]; then
            echo "Docker Hub namespace is required. Set DOCKERHUB_NAMESPACE repo variable or DOCKERHUB_USERNAME secret."
            exit 1
          fi

          for dir in charts/*/; do
            chart_name="terrakube-helm-chart"
            chart_version="$(helm show chart "$dir" | awk -F': ' '$1 == "version" { print $2; exit }')"
            oci_ref="oci://registry-1.docker.io/${namespace}/${chart_name}"

            if helm show chart "$oci_ref" --version "$chart_version" > /dev/null 2>&1; then
              echo "${chart_name} ${chart_version} already exists in Docker Hub, skipping OCI push."
              continue
            fi

            helm dependency build "$dir"
            package="$(helm package "$dir" --destination .oci-release-packages | awk -F': ' '/Successfully packaged chart and saved it to:/ { print $2 }')"
            helm push "$package" "oci://registry-1.docker.io/${namespace}"
          done

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.5.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
