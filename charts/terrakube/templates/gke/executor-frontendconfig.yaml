{{- if and (eq .Values.ingress.controller "gke") .Values.ingress.gke.enabled .Values.ingress.gke.frontendConfig.create }}
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: {{ .Values.name }}-executor-frontend-config
spec:
  redirectToHttps:
    enabled: {{ .Values.ingress.gke.frontendConfig.redirectToHttps }}
  {{- if .Values.ingress.gke.frontendConfig.executorSslPolicy }}
  sslPolicy: {{ .Values.ingress.gke.frontendConfig.executorSslPolicy }}
  {{- end }}
{{- end }}